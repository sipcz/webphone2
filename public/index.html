<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Telegram WebRTC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Telegram‑стиль відеодзвінок</h2>

<input id="roomId" placeholder="Room ID">
<input id="pin" placeholder="PIN">

<br>
<button id="joinBtn" class="primary">Увійти</button>

<h3>Локальне відео</h3>
<video id="localVideo" autoplay playsinline muted></video>

<h3>Віддалене відео</h3>
<video id="remoteVideo" autoplay playsinline></video>

<div class="controls">
  <button id="callBtn" class="primary">Подзвонити</button>
  <button id="answerBtn" class="green">Відповісти</button>
  <button id="hangupBtn" class="red">Завершити</button>
</div>

<div class="controls">
  <button id="muteBtn">Mute</button>
  <button id="cameraBtn">Camera Off</button>
  <button id="switchBtn">Switch Cam</button>
</div>

<div class="controls">
  <select id="quality">
    <option value="low">Low (320×240)</option>
    <option value="med">Medium (640×480)</option>
    <option value="high">High (1280×720)</option>
  </select>
</div>

<h3>Чат</h3>
<div id="chatWindow" class="chat"></div>

<div class="chatInput">
  <input id="chatInput" placeholder="Написати повідомлення...">
  <button id="sendChatBtn" class="primary">Send</button>
</div>

<h3>Учасники кімнати</h3>
<div id="usersList" class="users"></div>

<button id="themeBtn" class="primary">Темна тема</button>

<div id="incomingCallUI" class="incoming">
  <h3>Вхідний дзвінок</h3>
  <button id="acceptCall" class="green">Прийняти</button>
  <button id="declineCall" class="red">Відхилити</button>
</div>

<div id="status">Очікування…</div>

<audio id="ringtone" src="ringtone.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
